<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>EventPilot AI - Login</title>

    <link rel="stylesheet" href="css/login.css">
</head>

<body>

<div class="login-container">

    <div class="login-card">

        <h1>EventPilot AI</h1>
        <p>Intelligent Event Management System</p>

        <form id="loginForm">

            <input
                type="email"
                id="email"
                placeholder="Enter Email"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Enter Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <p id="message"></p>

    </div>

</div>

<script src="js/api.js"></script>
<script src="js/login.js"></script>

</body>
</html>
